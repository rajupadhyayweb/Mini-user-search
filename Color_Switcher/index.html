<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color_Switcher</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Color Changer</h1>
        <div>
            <button class="randomBtn">Random color</button>
            <input id="colorInput" type="text" placeholder="Enter a color or hex (e.g. red or #ffffff)">
            <button class="applyBtn">Apply Color</button>
        </div>
        <p class="currentColor">Current Color: <span class="currentColorValue">green</span></p> <br>
        <button class="resetBtn">Reset Color</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
